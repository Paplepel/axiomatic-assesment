services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axiomatic_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - axiomatic

  node:
    image: node:20-alpine
    container_name: axiomatic_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run build"
    networks:
      - axiomatic

  nginx:
    image: nginx:1.25-alpine
    container_name: axiomatic_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - axiomatic

  db:
    image: mariadb:11
    container_name: axiomatic_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-axiomatic}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-axiomatic}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - axiomatic

networks:
  axiomatic:
    driver: bridge

volumes:
  dbdata:
    driver: local
